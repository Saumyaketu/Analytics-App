<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics Demo Store</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      nav {
        background: black;
        color: white;
        padding: 20px;
        display: flex;
        justify-content: space-between;
      }

      .container {
        padding: 30px;
      }

      .products {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }

      .card {
        border: 1px solid #ddd;
        padding: 20px;
        width: 250px;
      }

      button {
        margin-top: 10px;
        padding: 10px;
        cursor: pointer;
        width: 100%;
      }

      footer {
        margin-top: 50px;
        background: #f4f4f4;
        padding: 20px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <nav>
      <div>Analytics Store</div>

      <div>Home | Products | Cart</div>
    </nav>

    <div class="container">
      <h1>Featured Products</h1>

      <div class="products">
        <div class="card">
          <h3>Wireless Headphones</h3>
          <p>Premium sound quality</p>

          <button>Add To Cart</button>
          <button>Buy Now</button>
        </div>

        <div class="card">
          <h3>Smart Watch</h3>
          <p>Track fitness and health</p>

          <button>Add To Cart</button>
          <button>Learn More</button>
        </div>
      </div>
    </div>

    <footer>Contact | About | Support</footer>

    <script src="../tracker/tracker.js"></script>
  </body>
</html>
